# Monitoring lab deployment values
replicaCount: 2

image:
  tag: "latest"
  pullPolicy: IfNotPresent

env:
  PORT: "5000"
  ENVIRONMENT: "monitoring"
  LOG_LEVEL: "INFO"

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

service:
  type: ClusterIP

ingress:
  enabled: false

autoscaling:
  enabled: false

rollout:
  enabled: false

statefulset:
  enabled: false

persistence:
  enabled: true

# Enable ServiceMonitor for Prometheus scraping
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels:
      release: monitoring

# Enable init containers for Lab 16 demonstration
initContainers:
  enabled: true
  download:
    enabled: true
    image: busybox:1.36
    url: "https://kubernetes.io/index.html"
    targetPath: "/work-dir/index.html"
  waitForService:
    enabled: false
    image: busybox:1.36
    serviceName: ""
    timeout: 150

hooks:
  preInstall:
    enabled: false
  postInstall:
    enabled: false
  preUpgrade:
    enabled: false
  postUpgrade:
    enabled: false
