apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "devops-app.fullname" . }}-test-connection"
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  containers:
  - name: wget
    image: busybox:1.36
    command: ['wget']
    args: ['{{ include "devops-app.fullname" . }}:{{ .Values.service.port }}/health']
  restartPolicy: Never
