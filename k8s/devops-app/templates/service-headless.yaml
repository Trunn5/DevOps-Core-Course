{{- if .Values.statefulset.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-app.fullname" . }}-headless
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: {{ .Values.statefulset.headlessService.publishNotReadyAddresses }}
  selector:
    {{- include "devops-app.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
{{- end }}
