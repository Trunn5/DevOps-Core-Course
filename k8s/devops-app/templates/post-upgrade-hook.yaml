{{- if .Values.hooks.postUpgrade.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "devops-app.fullname" . }}-post-upgrade
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: {{ include "devops-app.fullname" . }}-post-upgrade
    spec:
      restartPolicy: Never
      containers:
      - name: post-upgrade-job
        image: curlimages/curl:8.11.0
        command:
        - sh
        - -c
        - |
          echo "✨ Post-upgrade hook: Verifying upgrade..."
          sleep 15
          
          SERVICE={{ include "devops-app.fullname" . }}
          PORT={{ .Values.service.port }}
          
          echo "Testing upgraded service..."
          if curl -f http://$SERVICE:$PORT/health; then
            echo "✅ Upgrade verification passed!"
          else
            echo "⚠️  Upgrade verification failed"
            exit 1
          fi
{{- end }}
