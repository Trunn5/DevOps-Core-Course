{{- if and .Values.rollout.enabled .Values.rollout.analysis.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: health-check
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
spec:
  metrics:
  - name: health-endpoint
    interval: {{ .Values.rollout.analysis.interval }}
    count: {{ .Values.rollout.analysis.count }}
    failureLimit: {{ .Values.rollout.analysis.failureLimit }}
    provider:
      web:
        url: {{ default (printf "http://%s/health" (include "devops-app.fullname" .)) .Values.rollout.analysis.web.url | quote }}
        jsonPath: {{ .Values.rollout.analysis.web.jsonPath | quote }}
    successCondition: {{ .Values.rollout.analysis.successCondition | quote }}
{{- end }}
