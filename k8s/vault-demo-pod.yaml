apiVersion: v1
kind: Pod
metadata:
  name: vault-demo-pod
  namespace: devops
spec:
  serviceAccountName: devops-dev-devops-app
  initContainers:
  - name: vault-agent
    image: hashicorp/vault:1.18
    command:
    - sh
    - -c
    - |
      # Authenticate with Kubernetes auth
      KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
      VAULT_K8S_LOGIN=$(vault write -format=json auth/kubernetes/login role=devops-app jwt="$KUBE_TOKEN")
      VAULT_TOKEN=$(echo $VAULT_K8S_LOGIN | jq -r '.auth.client_token')
      
      # Fetch secrets
      export VAULT_TOKEN=$VAULT_TOKEN
      vault kv get -format=json secret/devops-app/config | jq -r '.data.data' > /secrets/config.json
      
      echo "Secrets fetched successfully:"
      cat /secrets/config.json
    env:
    - name: VAULT_ADDR
      value: "http://vault.devops.svc.cluster.local:8200"
    volumeMounts:
    - name: secrets
      mountPath: /secrets
  containers:
  - name: app
    image: busybox
    command: ['sh', '-c', 'echo "App running with secrets:"; cat /secrets/config.json; sleep 3600']
    volumeMounts:
    - name: secrets
      mountPath: /secrets
      readOnly: true
  volumes:
  - name: secrets
    emptyDir: {}
