---
- name: Create monitoring directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ monitoring_dir }}"
    - "{{ monitoring_dir }}/loki"
    - "{{ monitoring_dir }}/promtail"

- name: Template Loki configuration
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ monitoring_dir }}/loki/config.yml"
    mode: "0644"
  notify: restart monitoring

- name: Template Promtail configuration
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ monitoring_dir }}/promtail/config.yml"
    mode: "0644"
  notify: restart monitoring

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    mode: "0644"
  notify: restart monitoring

- name: Create .env file for Grafana password
  ansible.builtin.copy:
    content: |
      GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
    dest: "{{ monitoring_dir }}/.env"
    mode: "0644"
    owner: ubuntu
    group: ubuntu
  no_log: true
