---
- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Deploy application with Docker Compose
  block:
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: Template docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Pull latest image
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ compose_project_dir }}"
      changed_when: true

    - name: Start services with docker compose
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ compose_project_dir }}"
      register: compose_result
      changed_when: true

    - name: Wait for application to be ready
      ansible.builtin.wait_for:
        port: "{{ app_port }}"
        host: 127.0.0.1
        delay: 5
        timeout: 30

    - name: Verify health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/health"
        return_content: true
      register: health_check

    - name: Show health check result
      ansible.builtin.debug:
        var: health_check.json

  rescue:
    - name: Log deployment failure
      ansible.builtin.debug:
        msg: "Deployment of {{ app_name }} failed — check logs with: docker compose -f {{ compose_project_dir }}/docker-compose.yml logs"

  tags:
    - app_deploy
    - compose
