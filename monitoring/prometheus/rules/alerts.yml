groups:
  - name: application_alerts
    interval: 30s
    rules:
      # Service down alert
      - alert: ServiceDown
        expr: up{job="app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanize }} requests/sec"

      # Slow response time
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "95th percentile latency is {{ $value | humanize }}s"

      # Too many requests in progress
      - alert: HighConcurrency
        expr: http_requests_in_progress > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High number of concurrent requests"
          description: "{{ $value }} requests currently in progress"
